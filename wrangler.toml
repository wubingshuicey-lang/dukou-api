name = "dukou-api"
main = "src/index.js"
compatibility_date = "2025-01-01"

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "dukou-db"
database_id = "f03c94d7-1ab1-41c7-9539-42e7cd907e57"

# JWT_SECRET 不再放 vars（明文会进仓库/被 git 历史永久保留）。
# 用 secret 配置：
#   wrangler secret put JWT_SECRET
#   wrangler secret put JWT_SECRET --env production
# 生产环境必须用 >=32 字节随机串，且与开发环境不同。
[vars]
# (JWT_SECRET removed — configure via `wrangler secret put`)

[triggers]
crons = ["0 2 * * *"]

[env.production]
name = "dukou-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dukou-db"
database_id = "f03c94d7-1ab1-41c7-9539-42e7cd907e57"

[env.production.vars]
# (JWT_SECRET removed — configure via `wrangler secret put JWT_SECRET --env production`)
